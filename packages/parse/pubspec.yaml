name: ribs_parse
version: 1.0.0-dev.1
homepage: https://cranst0n.github.io/ribs/
repository: https://github.com/cranst0n/ribs
description: >
  Parser combinator library, a port of the Scala cats-parse project.
  Provides composable, immutable parsers with PEG semantics, suitable
  for performant text processing.

resolution: workspace
environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  collection: ^1.19.1 # binarySearch, SplayTreeSet
  meta:      ^1.10.0
  ribs_core: ^1.0.0-dev.14

dev_dependencies:
  lint:  ^2.8.0
  lints: ^6.1.0
  test:  ^1.0.0
