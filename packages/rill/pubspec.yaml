name: ribs_rill
version: 1.0.0-dev.3
homepage: https://cranst0n.github.io/ribs/
repository: https://github.com/cranst0n/ribs
description: >
  Functional, pull-based, chunked streaming with resource-safe finalizers,
  back-pressured channels, and observable signals — inspired by Scala's FS2.

topics:
  - streaming
  - functional-programming
  - concurrency

resolution: workspace
environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  ribs_binary: ^1.0.0-dev.12
  ribs_core:   ^1.0.0-dev.17
  ribs_effect: ^1.0.0-dev.5

dev_dependencies:
  code_builder: ^4.11.1
  dart_style:   ^3.1.3
  lint:         ^2.8.0
  lints:        ^6.1.0
  ribs_check: ^1.0.0-dev.10
  ribs_test:    ^1.0.0-dev.1
  test:         ^1.0.0
