name: ribs_test
version: 1.0.0-dev.1
homepage: https://cranst0n.github.io/ribs/
repository: https://github.com/cranst0n/ribs
description: >
  Test utilities and matchers for ribs packages. Provides matchers for
  Option, Either, Validated, IO, and Rill, plus a deterministic
  IORuntime for time-controlled IO tests.

topics:
  - testing
  - functional-programming

resolution: workspace
environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  matcher:     ^0.12.0
  ribs_core:   ^1.0.0-dev.15
  ribs_effect: ^1.0.0-dev.4
  ribs_rill:   ^1.0.0-dev.1
  test:        ^1.0.0

dev_dependencies:
  lint:  ^2.8.0
  lints: ^6.1.0
