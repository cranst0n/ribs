name: ribs_sql
version: 1.0.0-dev.4
homepage: https://cranst0n.github.io/ribs/
repository: https://github.com/cranst0n/ribs
description: >
  Functional SQL database layer with type-safe queries, streaming results via
  ribs_rill, and ribs_effect based resource management.

topics:
  - sql
  - database
  - functional-programming

resolution: workspace
environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  ribs_binary: ^1.0.0-dev.12
  ribs_core:   ^1.0.0-dev.16
  ribs_effect: ^1.0.0-dev.5
  ribs_json:   ^1.0.0-dev.18
  ribs_rill:   ^1.0.0-dev.2

dev_dependencies:
  dart_style: ^3.1.3
  lint:       ^2.8.0
  lints:      ^6.1.0
  ribs_check: ^1.0.0-dev.10
  test:       ^1.0.0
