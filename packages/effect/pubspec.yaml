name: ribs_effect
version: 1.0.0
homepage: https://cranst0n.github.io/ribs/
repository: https://github.com/cranst0n/ribs
description: >
  Functional effect system with IO monad, safe concurrent state (Ref), and
  resource management and pure synchronziation primitive (Deferred).

topics:
  - functional-programming
  - io
  - resource
  - concurrency

resolution: workspace
environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  async:     ^2.13.0
  meta:      ^1.10.0
  ribs_core: ^1.0.0
  web:       ^1.1.1

dev_dependencies:
  code_builder: ^4.11.1
  dart_style:   ^3.1.3
  lint:         ^2.8.0
  lints:        ^6.1.0
  ribs_check: ^1.0.0
  ribs_test:    ^1.0.0
  test:         ^1.0.0
