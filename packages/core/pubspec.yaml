name: ribs_core
version: 1.0.0
homepage: https://cranst0n.github.io/ribs/
repository: https://github.com/cranst0n/ribs
description: >
  Functional programming (FP) kernel. Provides common FP datatypes like
  Option, Either, State, Validated, as well as collection hierarchy
  inspired by the Scala programming language.

topics:
  - functional-programming
  - collections
  - immutable
  - option
  - either

resolution: workspace
environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  meta: ^1.10.0

dev_dependencies:
  code_builder: ^4.11.1
  dart_style:   ^3.1.3
  lint:         ^2.8.0
  lints:        ^6.1.0
  ribs_check: ^1.0.0
  ribs_test:    ^1.0.0
  test:         ^1.0.0
