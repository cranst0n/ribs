name: ribs_workspace
publish_to: none
environment:
  sdk: ">=3.7.0 <4.0.0"

workspace:
  - packages/bench
  - packages/binary
  - packages/check
  - packages/core
  - packages/effect
  - packages/http
  - packages/ip
  - packages/json
  - packages/limiter
  - packages/optics
  - packages/postgres
  - packages/rill
  - packages/rill_io
  - packages/sql
  - packages/sqlite
  - packages/units
  - website/snippets

dev_dependencies:
  melos: ^7.5.0
  remove_from_coverage: ^2.0.0

melos:
  scripts:
    test:
      run: melos exec -c 1 --fail-fast -- dart test
      description: Run all dart tests in this project.
      packageFilters:
        dirExists: test

    coverage:
      run: |
        melos exec -c 1 --fail-fast -- dart test --coverage="coverage"
        melos exec --dir-exists="test" format_coverage \
          --lcov \
          --in=coverage \
          --out=coverage.lcov \
          --report-on=lib
        melos exec --dir-exists="test" -- dart run remove_from_coverage:remove_from_coverage \
          -f coverage.lcov \
          -r '.*/generated/.*'
      description: Run all dart tests in this project with code coverage data.
      packageFilters:
        dirExists: test
        ignore:
          - "snippets"

    coverage-report:
      run: |
        melos exec -c 1 --fail-fast -- dart test --coverage="coverage"
        melos exec --dir-exists="test" format_coverage \
          --lcov \
          --in=coverage \
          --out=coverage.lcov \
          --report-on=lib
        melos exec --dir-exists="test" -- dart run remove_from_coverage:remove_from_coverage \
          -f coverage.lcov \
          -r '.*/generated/.*'
        find . -name coverage.lcov | xargs genhtml -o coverage-report
      description: Run all dart tests in this project and generate code coverage report.
      packageFilters:
        dirExists: test
        ignore:
          - "snippets"

    doc:
      run: |
        dart pub global run dartdoc_vitepress \
          --format vitepress \
          --workspace-docs \
          --exclude-packages 'ribs_bench,ribs_http,ribs_workspace,snippets' \
          --output website/vitepress-site
        cp -r website/docs/. website/vitepress-site/guide/
        node website/vitepress-site/.vitepress/separate-extension-methods.mjs
      description: Regenerate API docs, then restore guide docs from website/docs/ into website/vitepress-site/guide/.

    website-dev:
      run: cd website/vitepress-site && npm install && npx vitepress dev
      description: Install VitePress dependencies and start the dev server at http://localhost:5173.

    website-build:
      run: cd website/vitepress-site && npm install && npm run build
      description: Produce a deployable VitePress bundle in website/vitepress-site/.vitepress/dist/.

    analyze: melos exec -c1 -- dart analyze --fatal-infos .

    format: melos exec dart format --show=changed .

    clean:
      run: |
        melos exec -- rm -rf .dart_tool build coverage coverage.lcov doc
        find . -name "node_modules" -type d -prune -exec rm -rf {} + 2>/dev/null; true
        rm -rf coverage-report
        rm -rf website/vitepress-site/.vitepress/dist
      description: Remove build artifacts (.dart_tool, build, coverage, node_modules) from all packages and the workspace.

