name: Test website deployment

on:
  pull_request:
    branches:
      - main

jobs:
  test-deploy:
    name: Test deployment
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "website"

      - name: Run dartdoc_vitepress
        run: melos doc

      - name: Run VitePress build
        run: melos website-build